name: Sync Upstream

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/ymkiux/ldoSurfer.git || true
          git fetch upstream --prune

      - name: Fast-forward from upstream
        run: |
          git checkout main
          git merge --ff-only upstream/main

      - name: Push
        run: git push origin main
